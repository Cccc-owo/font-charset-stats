name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: "3.12"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libopengl0

      - name: Install dependencies
        run: uv sync --extra gui

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format
        run: uv run ruff format --check

      - name: Pyright
        run: uv run pyright

      - name: Verify imports
        run: |
          uv run python -c "
          from font_charset_stats.gui.theme import apply_theme
          from font_charset_stats.gui.app import MainWindow
          from font_charset_stats.gui.models import CoverageTableModel
          from font_charset_stats.gui.batch_dialog import BatchDialog
          from font_charset_stats.gui.export_dialog import ExportDialog
          from font_charset_stats.gui.results_view import ResultsView
          from font_charset_stats.gui.i18n import setup_translators
          from font_charset_stats.analyzer import analyze
          from font_charset_stats.cli import main
          print('All imports OK')
          "

  build-exe:
    if: github.event_name == 'push'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra gui

      - name: Install Nuitka
        run: uv pip install nuitka ordered-set zstandard

      - name: Build exe
        run: uv run python build_exe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: FontCharsetStats-Windows
          path: dist/FontCharsetStats.exe
